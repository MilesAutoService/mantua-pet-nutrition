# Netlify config for the Mantua Pet Nutrition content site.
# Static HTML — no build step. Publish directory is this folder.

[build]
  publish = "."
  command = ""

# Pretty URLs: serve /path and /path/ interchangeably, no trailing-slash surprises.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security + privacy headers on every page (good practice; also a minor trust signal)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Make sure the sitemap and robots files are served as plain text/xml
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
